<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>GitHub Issues Tracker</title>
  <script src="https://cdn.tailwindcss.com"></script>

  <style>
    body {
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont,
        "Segoe UI", sans-serif;
      background: #f5f7fb;
    }

    .shadow-soft {
      box-shadow: 0 10px 30px rgba(17, 24, 39, 0.08);
    }

    .card-shadow {
      box-shadow: 0 6px 20px rgba(17, 24, 39, 0.08);
    }

    .modal-shadow {
      box-shadow: 0 20px 60px rgba(15, 23, 42, 0.18);
    }

    .scroll-hidden::-webkit-scrollbar {
      display: none;
    }

    .scroll-hidden {
      -ms-overflow-style: none;
      scrollbar-width: none;
    }

    .spinner {
      width: 44px;
      height: 44px;
      border: 4px solid #e5e7eb;
      border-top: 4px solid #4f46e5;
      border-radius: 9999px;
      animation: spin 0.8s linear infinite;
    }

    @keyframes spin {
      to {
        transform: rotate(360deg);
      }
    }
  </style>
</head>
<body class="min-h-screen text-slate-800">

  <!-- NAVBAR -->
  <nav class="bg-white border-b border-slate-200 shadow-sm">
    <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-4">
      <div class="flex flex-col gap-4 md:flex-row md:items-center md:justify-between">
        
        <div class="flex items-center gap-3">
          <img
            src="https://github.githubassets.com/images/modules/logos_page/GitHub-Mark.png"
            alt="GitHub"
            class="w-8 h-8"
          />
          <h1 class="text-lg sm:text-xl font-bold text-slate-900">
            GitHub Issues Tracker
          </h1>
        </div>

        <div class="flex flex-col sm:flex-row gap-3 w-full md:w-auto">
          <div class="relative w-full sm:w-72">
            <span class="absolute left-3 top-1/2 -translate-y-1/2 text-slate-400">
              <svg xmlns="http://www.w3.org/2000/svg" class="w-4 h-4" fill="none"
                viewBox="0 0 24 24" stroke="currentColor">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                  d="m21 21-4.35-4.35M16 10.5A5.5 5.5 0 1 1 5 10.5a5.5 5.5 0 0 1 11 0Z" />
              </svg>
            </span>
            <input
              id="search"
              type="text"
              placeholder="Search issues..."
              onkeyup="searchIssues()"
              class="w-full border border-slate-200 rounded-lg pl-9 pr-3 py-2.5 text-sm outline-none focus:ring-2 focus:ring-indigo-500"
            />
          </div>

          <button
            onclick="openNewIssue()"
            class="bg-indigo-600 hover:bg-indigo-700 text-white px-4 py-2.5 rounded-lg text-sm font-medium transition"
          >
            + New Issue
          </button>
        </div>
      </div>
    </div>
  </nav>

  <!-- MAIN -->
  <main class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-8">

    <!-- FILTER TABS -->
    <section class="bg-white rounded-2xl shadow-soft p-4 mb-5">
      <div class="flex flex-wrap gap-3">
        <button id="tab-all" onclick="filterIssues('all')" class="tab-btn px-6 py-2.5 rounded-lg text-sm font-medium transition">
          All
        </button>
        <button id="tab-open" onclick="filterIssues('open')" class="tab-btn px-6 py-2.5 rounded-lg text-sm font-medium transition">
          Open
        </button>
        <button id="tab-closed" onclick="filterIssues('closed')" class="tab-btn px-6 py-2.5 rounded-lg text-sm font-medium transition">
          Closed
        </button>
      </div>
    </section>

    <!-- STATS HEADER -->
    <section class="bg-white rounded-2xl shadow-soft overflow-hidden mb-6">
      <div class="p-5 sm:p-6 flex flex-col md:flex-row md:items-center md:justify-between gap-4 border-b border-slate-100">
        
        <div class="flex items-start gap-3">
          <div class="w-10 h-10 rounded-full bg-indigo-100 flex items-center justify-center text-indigo-600">
            <svg xmlns="http://www.w3.org/2000/svg" class="w-5 h-5" fill="none"
              viewBox="0 0 24 24" stroke="currentColor">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                d="M9 12h6m-6 4h6M8 4h8a2 2 0 0 1 2 2v12a2 2 0 0 1-2 2H8a2 2 0 0 1-2-2V6a2 2 0 0 1 2-2Z" />
            </svg>
          </div>

          <div>
            <h2 class="text-xl font-bold text-slate-900">
              <span id="allCount">0</span> Issues
            </h2>
            <p class="text-sm text-slate-500">
              Track and manage your project issues
            </p>
          </div>
        </div>

        <div class="flex items-center gap-5 text-sm text-slate-700">
          <div class="flex items-center gap-2">
            <span class="w-2.5 h-2.5 rounded-full bg-emerald-500"></span>
            <span>Open <span id="openCount">0</span></span>
          </div>
          <div class="flex items-center gap-2">
            <span class="w-2.5 h-2.5 rounded-full bg-violet-500"></span>
            <span>Closed <span id="closedCount">0</span></span>
          </div>
        </div>
      </div>

      <!-- LOADER -->
      <div id="loader" class="hidden py-16 flex justify-center items-center">
        <div class="spinner"></div>
      </div>

      <!-- GRID -->
      <div id="issuesContainer" class="p-4 sm:p-6 grid grid-cols-1 sm:grid-cols-2 xl:grid-cols-4 gap-6">
      </div>

      <!-- EMPTY -->
      <div id="emptyState" class="hidden p-12 text-center text-slate-500">
        No issues found.
      </div>
    </section>
  </main>

  <!-- ISSUE DETAILS MODAL -->
  <div id="modal" class="fixed inset-0 bg-slate-900/35 backdrop-blur-[2px] hidden items-center justify-center z-50 p-4">
    <div class="w-full max-w-6xl bg-white rounded-[28px] modal-shadow relative max-h-[92vh] overflow-y-auto scroll-hidden">
      <div class="p-6 sm:p-8 lg:p-10">
        <div id="issueDetails"></div>
      </div>
    </div>
  </div>

  <!-- NEW ISSUE MODAL -->
  <div id="newIssueModal" class="fixed inset-0 bg-slate-900/35 backdrop-blur-[2px] hidden items-center justify-center z-50 p-4">
    <div class="w-full max-w-lg bg-white rounded-3xl modal-shadow p-6">
      <h2 class="text-2xl font-bold text-slate-900 mb-5">Create New Issue</h2>

      <div class="space-y-4">
        <input id="newTitle" type="text" placeholder="Issue title"
          class="w-full border border-slate-200 rounded-xl px-4 py-3 outline-none focus:ring-2 focus:ring-indigo-500" />

        <textarea id="newDescription" rows="4" placeholder="Description"
          class="w-full border border-slate-200 rounded-xl px-4 py-3 outline-none focus:ring-2 focus:ring-indigo-500"></textarea>

        <input id="newAuthor" type="text" placeholder="Author name"
          class="w-full border border-slate-200 rounded-xl px-4 py-3 outline-none focus:ring-2 focus:ring-indigo-500" />

        <div class="grid grid-cols-1 sm:grid-cols-2 gap-4">
          <select id="newStatus" class="w-full border border-slate-200 rounded-xl px-4 py-3 outline-none focus:ring-2 focus:ring-indigo-500">
            <option value="open">Open</option>
            <option value="closed">Closed</option>
          </select>

          <select id="newPriority" class="w-full border border-slate-200 rounded-xl px-4 py-3 outline-none focus:ring-2 focus:ring-indigo-500">
            <option value="HIGH">HIGH</option>
            <option value="MEDIUM">MEDIUM</option>
            <option value="LOW">LOW</option>
          </select>
        </div>
      </div>

      <div class="flex justify-end gap-3 mt-6">
        <button onclick="closeNewIssue()" class="px-5 py-2.5 rounded-xl bg-slate-100 hover:bg-slate-200 text-slate-700 font-medium">
          Cancel
        </button>
        <button onclick="createIssue()" class="px-5 py-2.5 rounded-xl bg-indigo-600 hover:bg-indigo-700 text-white font-medium">
          Create
        </button>
      </div>
    </div>
  </div>

  <script>
    const API_ALL = "https://phi-lab-server.vercel.app/api/v1/lab/issues";
    const API_SINGLE = "https://phi-lab-server.vercel.app/api/v1/lab/issue/";
    const API_SEARCH = "https://phi-lab-server.vercel.app/api/v1/lab/issues/search?q=";

    let issues = [];
    let currentIssues = [];
    let currentFilter = "all";

    function showLoader() {
      document.getElementById("loader").classList.remove("hidden");
    }

    function hideLoader() {
      document.getElementById("loader").classList.add("hidden");
    }

    function formatDate(dateString) {
      if (!dateString) return "22/02/2026";
      const date = new Date(dateString);
      if (isNaN(date)) return dateString;
      return date.toLocaleDateString("en-GB");
    }

    function escapeHtml(text = "") {
      return text
        .replaceAll("&", "&amp;")
        .replaceAll("<", "&lt;")
        .replaceAll(">", "&gt;")
        .replaceAll('"', "&quot;")
        .replaceAll("'", "&#039;");
    }

    function setActiveTab(type) {
      const tabs = ["all", "open", "closed"];
      tabs.forEach(tab => {
        const btn = document.getElementById(`tab-${tab}`);
        if (!btn) return;

        if (tab === type) {
          btn.className = "tab-btn px-6 py-2.5 rounded-lg text-sm font-medium transition bg-indigo-600 text-white shadow";
        } else {
          btn.className = "tab-btn px-6 py-2.5 rounded-lg text-sm font-medium transition bg-white border border-slate-200 text-slate-600 hover:bg-slate-50";
        }
      });
    }

    function updateCounts() {
      const open = issues.filter(i => i.status === "open").length;
      const closed = issues.filter(i => i.status === "closed").length;

      document.getElementById("allCount").innerText = issues.length;
      document.getElementById("openCount").innerText = open;
      document.getElementById("closedCount").innerText = closed;
    }

    function getPriorityClass(priority) {
      if (priority === "HIGH") return "bg-red-100 text-red-500";
      if (priority === "MEDIUM") return "bg-yellow-100 text-yellow-600";
      return "bg-slate-100 text-slate-400";
    }

    function getStatusIcon(status) {
      if (status === "closed") {
        return `
          <div class="w-9 h-9 rounded-full bg-violet-100 flex items-center justify-center text-violet-500">
            <svg xmlns="http://www.w3.org/2000/svg" class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor">
              <circle cx="12" cy="12" r="9" stroke-width="2"></circle>
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12l2 2 4-4"></path>
            </svg>
          </div>
        `;
      }

      return `
        <div class="w-9 h-9 rounded-full bg-emerald-100 flex items-center justify-center text-emerald-500">
          <svg xmlns="http://www.w3.org/2000/svg" class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor">
            <circle cx="12" cy="12" r="8" stroke-width="2" stroke-dasharray="3 2"></circle>
          </svg>
        </div>
      `;
    }

    function renderIssues(data) {
      const container = document.getElementById("issuesContainer");
      const emptyState = document.getElementById("emptyState");

      container.innerHTML = "";

      if (!data.length) {
        emptyState.classList.remove("hidden");
        return;
      }

      emptyState.classList.add("hidden");

      data.forEach(issue => {
        const borderColor = issue.status === "open" ? "border-emerald-500" : "border-violet-500";
        const priorityClass = getPriorityClass(issue.priority);
        const statusIcon = getStatusIcon(issue.status);

        container.innerHTML += `
          <div
            onclick="openIssue(${issue.id})"
            class="bg-white rounded-2xl card-shadow border-t-4 ${borderColor} p-5 cursor-pointer hover:-translate-y-1 hover:shadow-lg transition duration-200 flex flex-col min-h-[250px]">

            <div class="flex justify-between items-start mb-5">
              ${statusIcon}

              <span class="text-xs font-medium px-4 py-1.5 rounded-full ${priorityClass}">
                ${issue.priority || "LOW"}
              </span>
            </div>

            <h3 class="text-[15px] sm:text-base font-bold text-slate-800 leading-snug mb-2 line-clamp-2">
              ${escapeHtml(issue.title || "Untitled Issue")}
            </h3>

            <p class="text-sm text-slate-400 leading-6 mb-4 line-clamp-3">
              ${escapeHtml(issue.description || "No description available.")}
            </p>

            <div class="flex flex-wrap gap-2 mb-5">
              <span class="text-[11px] px-2.5 py-1 rounded-full bg-red-50 text-red-400 border border-red-200">
                BUG
              </span>
              <span class="text-[11px] px-2.5 py-1 rounded-full bg-amber-50 text-amber-500 border border-amber-200">
                HELP WANTED
              </span>
            </div>

            <div class="mt-auto text-xs text-slate-400 leading-5">
              <span class="font-medium text-slate-500">#${issue.id}</span> by ${escapeHtml(issue.author || "john_doe")}<br>
              ${formatDate(issue.created_at)}
            </div>
          </div>
        `;
      });
    }

    async function loadIssues() {
      try {
        showLoader();
        const res = await fetch(API_ALL);
        const data = await res.json();

        issues = data.data || [];
        currentIssues = [...issues];

        updateCounts();
        setActiveTab("all");
        renderIssues(currentIssues);
      } catch (error) {
        document.getElementById("issuesContainer").innerHTML = `
          <div class="col-span-full bg-red-50 text-red-500 border border-red-200 rounded-xl p-4">
            Failed to load issues.
          </div>
        `;
      } finally {
        hideLoader();
      }
    }

    function filterIssues(type) {
      currentFilter = type;
      setActiveTab(type);

      if (type === "all") {
        currentIssues = [...issues];
      } else {
        currentIssues = issues.filter(issue => issue.status === type);
      }

      const searchText = document.getElementById("search").value.trim().toLowerCase();

      if (searchText) {
        const filtered = currentIssues.filter(issue =>
          (issue.title || "").toLowerCase().includes(searchText)
        );
        renderIssues(filtered);
      } else {
        renderIssues(currentIssues);
      }
    }

    async function searchIssues() {
      const text = document.getElementById("search").value.trim();

      if (!text) {
        filterIssues(currentFilter);
        return;
      }

      try {
        showLoader();

        const res = await fetch(`${API_SEARCH}${encodeURIComponent(text)}`);
        const data = await res.json();

        let searchData = data.data || [];

        if (currentFilter !== "all") {
          searchData = searchData.filter(issue => issue.status === currentFilter);
        }

        renderIssues(searchData);
      } catch (error) {
        renderIssues([]);
      } finally {
        hideLoader();
      }
    }

    async function openIssue(id) {
      try {
        const res = await fetch(`${API_SINGLE}${id}`);
        const data = await res.json();
        const issue = data.data;

        const isOpen = issue.status === "open";

        const statusBadge = isOpen
          ? `<span class="inline-flex items-center rounded-full bg-emerald-500 text-white text-sm font-medium px-4 py-2">Opened</span>`
          : `<span class="inline-flex items-center rounded-full bg-violet-500 text-white text-sm font-medium px-4 py-2">Closed</span>`;

        const priorityColor =
          issue.priority === "HIGH"
            ? "bg-red-500"
            : issue.priority === "MEDIUM"
            ? "bg-yellow-500"
            : "bg-slate-400";

        document.getElementById("issueDetails").innerHTML = `
          <div class="space-y-7">
            
            <div>
              <h2 class="text-3xl sm:text-4xl lg:text-[52px] leading-tight font-bold text-slate-800 mb-4">
                ${escapeHtml(issue.title || "Untitled Issue")}
              </h2>

              <div class="flex flex-wrap items-center gap-3 text-slate-500 text-lg">
                ${statusBadge}
                <span>•</span>
                <span>Opened by ${escapeHtml(issue.author || "Fahim Ahmed")}</span>
                <span>•</span>
                <span>${formatDate(issue.created_at)}</span>
              </div>
            </div>

            <div class="flex flex-wrap gap-3">
              <span class="text-sm px-4 py-2 rounded-full bg-red-50 text-red-500 border border-red-200 font-medium">
                BUG
              </span>
              <span class="text-sm px-4 py-2 rounded-full bg-amber-50 text-amber-500 border border-amber-200 font-medium">
                HELP WANTED
              </span>
            </div>

            <p class="text-slate-500 text-xl leading-10 max-w-5xl">
              ${escapeHtml(issue.description || "No description available.")}
            </p>

            <div class="border-2 border-sky-500 rounded-md p-6">
              <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                
                <div class="border border-sky-400 border-dashed rounded p-4">
                  <p class="text-[18px] text-slate-500 mb-2">Assignee:</p>
                  <p class="text-2xl font-bold text-slate-800">
                    ${escapeHtml(issue.author || "Fahim Ahmed")}
                  </p>
                </div>

                <div class="border border-sky-400 border-dashed rounded p-4">
                  <p class="text-[18px] text-slate-500 mb-3">Priority:</p>
                  <span class="${priorityColor} text-white px-5 py-2 rounded-full text-base font-semibold inline-block">
                    ${escapeHtml(issue.priority || "LOW")}
                  </span>
                </div>

              </div>
            </div>

            <div class="flex justify-end pt-2">
              <button
                onclick="closeModal()"
                class="bg-indigo-600 hover:bg-indigo-700 text-white text-xl font-semibold px-8 py-4 rounded-xl transition">
                Close
              </button>
            </div>
          </div>
        `;

        const modal = document.getElementById("modal");
        modal.classList.remove("hidden");
        modal.classList.add("flex");
      } catch (error) {
        alert("Failed to load issue details.");
      }
    }

    function closeModal() {
      const modal = document.getElementById("modal");
      modal.classList.add("hidden");
      modal.classList.remove("flex");
    }

    function openNewIssue() {
      const modal = document.getElementById("newIssueModal");
      modal.classList.remove("hidden");
      modal.classList.add("flex");
    }

    function closeNewIssue() {
      const modal = document.getElementById("newIssueModal");
      modal.classList.add("hidden");
      modal.classList.remove("flex");

      document.getElementById("newTitle").value = "";
      document.getElementById("newDescription").value = "";
      document.getElementById("newAuthor").value = "";
      document.getElementById("newStatus").value = "open";
      document.getElementById("newPriority").value = "HIGH";
    }

    function createIssue() {
      const title = document.getElementById("newTitle").value.trim();
      const description = document.getElementById("newDescription").value.trim();
      const author = document.getElementById("newAuthor").value.trim() || "anonymous";
      const status = document.getElementById("newStatus").value;
      const priority = document.getElementById("newPriority").value;

      if (!title) {
        alert("Issue title is required!");
        return;
      }

      const newIssue = {
        id: issues.length ? Math.max(...issues.map(i => i.id)) + 1 : 1,
        title,
        description,
        author,
        status,
        priority,
        created_at: new Date().toISOString()
      };

      issues.unshift(newIssue);
      updateCounts();
      closeNewIssue();
      filterIssues(currentFilter);
    }

    document.getElementById("modal").addEventListener("click", function (e) {
      if (e.target.id === "modal") {
        closeModal();
      }
    });

    document.getElementById("newIssueModal").addEventListener("click", function (e) {
      if (e.target.id === "newIssueModal") {
        closeNewIssue();
      }
    });

    loadIssues();
  </script>
</body>
</html>
