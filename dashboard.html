<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>GitHub Issues Tracker</title>
  <script src="https://cdn.tailwindcss.com"></script>

  <style>
    body{
      font-family: Inter, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background:#f5f7fb;
    }

    .soft-shadow{
      box-shadow:0 8px 28px rgba(15,23,42,.08);
    }

    .card-shadow{
      box-shadow:0 4px 14px rgba(15,23,42,.07);
    }

    .spinner{
      width:40px;
      height:40px;
      border:4px solid #e5e7eb;
      border-top:4px solid #4f46e5;
      border-radius:999px;
      animation:spin .8s linear infinite;
    }

    @keyframes spin{
      to{ transform:rotate(360deg); }
    }
  </style>
</head>
<body class="min-h-screen text-slate-800">

  <!-- NAVBAR -->
  <nav class="bg-white border-b border-slate-200">
    <div class="max-w-6xl mx-auto px-4 sm:px-6 py-4">
      <div class="flex flex-col md:flex-row md:items-center md:justify-between gap-4">
        
        <div class="flex items-center gap-3">
          <img
            src="https://github.githubassets.com/images/modules/logos_page/GitHub-Mark.png"
            alt="GitHub"
            class="w-8 h-8"
          />
          <h1 class="text-xl sm:text-2xl font-bold text-slate-900">
            GitHub Issues Tracker
          </h1>
        </div>

        <div class="flex flex-col sm:flex-row gap-3 w-full md:w-auto">
          <div class="relative w-full sm:w-64">
            <span class="absolute left-3 top-1/2 -translate-y-1/2 text-slate-400">
              <svg xmlns="http://www.w3.org/2000/svg" class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="m21 21-4.35-4.35M16 10.5A5.5 5.5 0 1 1 5 10.5a5.5 5.5 0 0 1 11 0Z"/>
              </svg>
            </span>

            <input
              id="search"
              type="text"
              placeholder="Search issues..."
              onkeyup="searchIssues()"
              class="w-full border border-slate-200 rounded-lg pl-9 pr-3 py-2 text-sm outline-none focus:ring-2 focus:ring-indigo-500"
            />
          </div>

          <button
            onclick="openNewIssue()"
            class="bg-indigo-600 hover:bg-indigo-700 text-white px-4 py-2 rounded-lg text-sm font-medium transition"
          >
            + New Issue
          </button>
        </div>
      </div>
    </div>
  </nav>

  <!-- MAIN -->
  <main class="max-w-4xl xl:max-w-5xl mx-auto px-4 sm:px-6 py-8">

    <!-- TABS -->
    <section class="bg-white rounded-2xl soft-shadow p-4 sm:p-5 mb-5">
      <div class="flex flex-wrap gap-3">
        <button
          id="tab-all"
          onclick="filterIssues('all')"
          class="px-5 sm:px-7 py-2.5 sm:py-3 rounded-xl text-sm sm:text-base font-medium border border-slate-300 bg-indigo-600 text-white transition"
        >
          All
        </button>

        <button
          id="tab-open"
          onclick="filterIssues('open')"
          class="px-5 sm:px-7 py-2.5 sm:py-3 rounded-xl text-sm sm:text-base font-medium border border-slate-300 bg-white text-slate-600 transition"
        >
          Open
        </button>

        <button
          id="tab-closed"
          onclick="filterIssues('closed')"
          class="px-5 sm:px-7 py-2.5 sm:py-3 rounded-xl text-sm sm:text-base font-medium border border-slate-300 bg-white text-slate-600 transition"
        >
          Closed
        </button>
      </div>
    </section>

    <!-- HEADER -->
    <section class="bg-white rounded-2xl soft-shadow overflow-hidden">
      <div class="p-4 sm:p-5 border-b border-slate-100 flex flex-col md:flex-row md:items-center md:justify-between gap-4">
        
        <div class="flex items-center gap-4">
          <div class="w-12 h-12 rounded-full bg-violet-100 flex items-center justify-center text-violet-600 shrink-0">
            <svg xmlns="http://www.w3.org/2000/svg" class="w-6 h-6" fill="none" viewBox="0 0 24 24" stroke="currentColor">
              <circle cx="12" cy="12" r="8" stroke-width="2"></circle>
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8.5 12h7M12 8.5l3.5 7h-7L12 8.5Z"></path>
            </svg>
          </div>

          <div>
            <h2 class="text-2xl sm:text-3xl font-bold text-slate-900">
              <span id="visibleCount">0</span> Issues
            </h2>
            <p class="text-sm sm:text-base text-slate-500 mt-1">
              Track and manage your project issues
            </p>
          </div>
        </div>

        <div class="flex items-center gap-5 text-sm text-slate-700">
          <div class="flex items-center gap-2">
            <span class="w-2.5 h-2.5 rounded-full bg-emerald-500"></span>
            <span>Open <span id="openCount">0</span></span>
          </div>

          <div class="flex items-center gap-2">
            <span class="w-2.5 h-2.5 rounded-full bg-violet-500"></span>
            <span>Closed <span id="closedCount">0</span></span>
          </div>
        </div>
      </div>

      <!-- LOADER -->
      <div id="loader" class="hidden py-14 flex items-center justify-center">
        <div class="spinner"></div>
      </div>

      <!-- GRID -->
      <div
        id="issuesContainer"
        class="p-4 sm:p-5 grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-4"
      ></div>

      <div id="emptyState" class="hidden px-6 pb-8 text-center text-slate-500 text-base">
        No issues found.
      </div>
    </section>
  </main>

  <!-- MODAL -->
  <div
    id="modal"
    class="fixed inset-0 bg-black/35 hidden items-center justify-center p-4 z-50"
  >
    <div class="w-full max-w-4xl bg-white rounded-[24px] shadow-2xl max-h-[92vh] overflow-y-auto">
      <div class="p-5 sm:p-7 lg:p-8" id="issueDetails"></div>
    </div>
  </div>

  <script src="script.js"></script>
</body>
</html>
