<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>GitHub Issues Tracker</title>

<script src="https://cdn.tailwindcss.com"></script>

</head>


<body class="bg-gray-100">

<!-- NAVBAR -->

<nav class="bg-white border-b shadow-sm">

<div class="max-w-7xl mx-auto px-6 py-4 flex flex-col md:flex-row md:justify-between md:items-center gap-4">

<div class="flex items-center gap-3 font-semibold text-lg">

<img src="https://github.githubassets.com/images/modules/logos_page/GitHub-Mark.png" class="w-7 h-7">

<span>GitHub Issues Tracker</span>

</div>


<div class="flex gap-2">

<input
id="search"
onkeyup="searchIssue()"
placeholder="Search issues..."
class="border rounded-lg px-4 py-2 text-sm w-full md:w-64"
/>

<button
onclick="openNewIssue()"
class="bg-indigo-600 hover:bg-indigo-700 text-white px-4 py-2 rounded-lg text-sm">

+ New Issue

</button>

</div>

</div>

</nav>



<!-- MAIN -->

<div class="max-w-7xl mx-auto p-6">


<!-- FILTER -->

<div class="bg-white p-4 rounded-lg shadow-sm flex gap-3 mb-6">

<button onclick="filterIssues('all')" class="bg-indigo-600 text-white px-4 py-1.5 rounded">
All
</button>

<button onclick="filterIssues('open')" class="bg-gray-200 px-4 py-1.5 rounded">
Open
</button>

<button onclick="filterIssues('closed')" class="bg-gray-200 px-4 py-1.5 rounded">
Closed
</button>

</div>



<!-- HEADER -->

<div class="bg-white p-6 rounded-lg shadow-sm mb-6">

<h2 id="count" class="text-xl font-bold">
Issues
</h2>
<img src="assets/Aperture.png" alt="">
<p class="text-gray-500 text-sm">
Track and manage your project issues
</p>

</div>



<!-- ISSUE GRID -->

<div id="issues"
class="grid grid-cols-1 sm:grid-cols-2 md:grid-cols-3 lg:grid-cols-4 gap-6">

</div>

</div>



<!-- ISSUE MODAL -->

<div id="modal"
class="fixed inset-0 bg-black/40 hidden items-center justify-center p-4">

<div class="bg-white w-full max-w-xl rounded-xl p-6">

<div id="issueDetails"></div>

</div>

</div>



<!-- NEW ISSUE MODAL -->

<div id="newIssueModal"
class="fixed inset-0 bg-black/40 hidden items-center justify-center p-4">

<div class="bg-white w-full max-w-md rounded-xl p-6">

<h2 class="text-lg font-bold mb-4">
Create New Issue
</h2>

<input
placeholder="Issue title"
class="border w-full p-2 rounded mb-3"
/>

<textarea
placeholder="Description"
class="border w-full p-2 rounded mb-4"></textarea>

<div class="flex justify-end gap-2">

<button
onclick="closeNewIssue()"
class="px-4 py-2 bg-gray-200 rounded">

Cancel

</button>

<button class="px-4 py-2 bg-indigo-600 text-white rounded">

Create

</button>

</div>

</div>

</div>



<script>


const API = "https://phi-lab-server.vercel.app/api/v1/lab/issues"

let issues = []



async function loadIssues(){

const res = await fetch(API)

const data = await res.json()

issues = data.data

showIssues(issues)

}



function showIssues(data){

const container = document.getElementById("issues")

container.innerHTML = ""

document.getElementById("count").innerText = data.length + " Issues"



data.forEach(issue => {



let borderColor = issue.status === "open"
? "border-green-500"
: "border-purple-500"


let priorityColor = ""

if(issue.priority === "HIGH"){
priorityColor = "bg-red-100 text-red-600"
}

else if(issue.priority === "MEDIUM"){
priorityColor = "bg-yellow-100 text-yellow-600"
}

else if(issue.priority === "LOW"){
priorityColor = "bg-purple-100 text-purple-600"
}


let icon = ""

if(issue.priority === "HIGH" || issue.priority === "MEDIUM"){

icon = `
<div class="text-green-600 bg-green-100 p-1 rounded-full">

<svg xmlns="http://www.w3.org/2000/svg"
class="w-4 h-4"
fill="none"
viewBox="0 0 24 24"
stroke="currentColor">

<circle cx="12" cy="12" r="9"
stroke-width="2"
stroke-dasharray="4 2"/>

</svg>

</div>
`

}

else{

icon = `
<div class="text-purple-600 bg-purple-100 p-1 rounded-full">

<svg xmlns="http://www.w3.org/2000/svg"
class="w-4 h-4"
fill="none"
viewBox="0 0 24 24"
stroke="currentColor">

<path stroke-linecap="round"
stroke-linejoin="round"
stroke-width="3"
d="M5 13l4 4L19 7"/>

</svg>

</div>
`

}



container.innerHTML += `

<div
onclick="openIssue(${issue.id})"
class="bg-white p-5 rounded-xl shadow border-t-4 ${borderColor} cursor-pointer hover:shadow-lg transition flex flex-col">

<div class="flex justify-between items-start mb-3">

${icon}

<span class="text-xs px-2 py-1 rounded ${priorityColor}">
${issue.priority}
</span>

</div>


<h3 class="font-semibold mb-2 text-sm">
${issue.title}
</h3>

img 
<p class="text-sm text-gray-500 mb-4">
${issue.description || ""}
</p>


<div class="flex gap-2 text-xs mb-4">

<span class="bg-red-100 text-red-500 px-2 py-1 rounded">
BUG
</span>

<span class="bg-yellow-100 text-yellow-600 px-2 py-1 rounded">
HELP WANTED
</span>

</div>


<div class="text-xs text-gray-400 mt-auto">

#${issue.id} ${issue.author || "john_doe"} <br>

${issue.created_at || "1/15/2024"}

</div>

</div>

`

})

}



function filterIssues(type){

if(type === "all"){
showIssues(issues)
return
}

const filtered = issues.filter(i => i.status === type)

showIssues(filtered)

}



async function searchIssue(){

let text = document.getElementById("search").value

if(text.length === 0){
showIssues(issues)
return
}

const res = await fetch(
`https://phi-lab-server.vercel.app/api/v1/lab/issues/search?q=${text}`
)

const data = await res.json()

showIssues(data.data)

}



async function openIssue(id){

const res = await fetch(
`https://phi-lab-server.vercel.app/api/v1/lab/issue/${id}`
)

const data = await res.json()

const issue = data.data



let priorityColor = "bg-blue-500"

if(issue.priority === "HIGH"){
priorityColor = "bg-red-500"
}

if(issue.priority === "MEDIUM"){
priorityColor = "bg-yellow-500"
}



document.getElementById("issueDetails").innerHTML = `

<h2 class="text-xl font-bold mb-2">
${issue.title}
</h2>

<p class="text-sm text-gray-500 mb-4">
Opened by ${issue.author || "Fahim Ahmed"}
</p>

<p class="text-gray-600 mb-6">
${issue.description}
</p>


<div class="grid grid-cols-2 gap-4 mb-6">

<div class="border p-4 rounded-lg">

<p class="text-sm text-gray-500">
Assignee
</p>

<p class="font-semibold">
${issue.author || "Fahim Ahmed"}
</p>

</div>


<div class="border p-4 rounded-lg">

<p class="text-sm text-gray-500">
Priority
</p>

<span class="${priorityColor} text-white px-3 py-1 rounded-full text-xs">
${issue.priority}
</span>

</div>

</div>


<div class="flex justify-end">

<button
onclick="closeModal()"
class="bg-indigo-600 hover:bg-indigo-700 text-white px-6 py-2 rounded-lg">

Close

</button>

</div>

`

document.getElementById("modal").classList.remove("hidden")
document.getElementById("modal").classList.add("flex")

}



function closeModal(){

document.getElementById("modal").classList.add("hidden")

}



function openNewIssue(){

document.getElementById("newIssueModal").classList.remove("hidden")

document.getElementById("newIssueModal").classList.add("flex")

}



function closeNewIssue(){

document.getElementById("newIssueModal").classList.add("hidden")

}



loadIssues()

</script>


</body>
</html>
