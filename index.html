<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>GitHub Issues Tracker - Login</title>
  <script src="https://cdn.tailwindcss.com"></script>

  <style>
    body {
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: #f8fafc;
    }

    .soft-shadow {
      box-shadow: 0 12px 32px rgba(15, 23, 42, 0.08);
    }
  </style>
</head>
     <body class="min-h-screen flex items-center justify-center px-4">

    <div class="w-full max-w-md bg-white rounded-2xl soft-shadow border border-slate-200 px-7 py-8">
    <div class="flex flex-col items-center text-center mb-7">
      <div class="w-24 h-24 rounded-full bg-slate-900 flex items-center justify-center mb-5">
        <img
          src="assets/github-logo.png"
          alt="GitHub Logo"
          class="w-14 h-14 object-contain brightness-0 invert"
        />
      </div>

      <h1 class="text-4xl font-bold text-slate-800 leading-tight">
        GitHub Issues Tracker</h1>
      <p class="text-slate-500 text-lg mt-2">
        Sign in to manage your issues
      </p>
      </div>

    <form onsubmit="login(event)" class="space-y-5">
      <div>
        <label for="username" class="block text-base font-medium text-slate-700 mb-2">
          Username
        </label>
        <input
          id="username"
          type="text"
          placeholder="Enter Username"
          class="w-full h-14 px-4 rounded-lg border border-slate-300 outline-none focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500 text-slate-700"/>
        <p class="text-indigo-500 text-sm mt-2">Default: admin</p>
      </div>

    <div>
        <label for="password" class="block text-base font-medium text-slate-700 mb-2">
          Password
        </label>
        <input
          id="password"
          type="password"
          placeholder="Enter Password"
          class="w-full h-14 px-4 rounded-lg border border-slate-300 outline-none focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500 text-slate-700"/>
        <p class="text-indigo-500 text-sm mt-2">Default: admin123</p>
      </div>

      <button
        type="submit"
        class="w-full h-14 rounded-lg bg-gradient-to-r from-indigo-600 to-violet-600 text-white font-semibold text-lg hover:opacity-95 transition"
        >
        Sign In
      </button>
    </form>

<div class="my-6 flex items-center gap-4">
      <div class="flex-1 h-px bg-slate-200"></div>
      <span class="text-slate-500 font-medium">OR</span>
      <div class="flex-1 h-px bg-slate-200"></div>
</div>

    
<div class="bg-slate-50 border border-slate-200 rounded-lg px-5 py-5 text-center">
      <p class="text-slate-400 text-sm mb-4">Demo Credentials:</p>
      <p class="text-slate-800 font-semibold text-lg">
        Username: <span class="font-normal">admin</span>
      </p>
      <p class="text-slate-800 font-semibold text-lg">
        Password: <span class="font-normal">admin123</span>
      </p>
     </div>
  </div>

     <script src="script.js"></script>
</body>
</html>
